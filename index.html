<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>体重管理アプリ</title>

<style>
:root{
  --main:#2563eb;
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#dbe2ea;
  --success:#16a34a;
  --danger:#dc2626;
  --text:#111827;
  --muted:#6b7280;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
}

.container{
  max-width:720px;
  margin:auto;
  padding:24px;
}

.card{
  background:var(--card);
  border-radius:24px;
  padding:24px;
  margin-bottom:24px;
  box-shadow:0 4px 16px rgba(0,0,0,0.06);
}

h1{
  margin-top:0;
}

button{
  border:none;
  border-radius:14px;
  padding:14px 18px;
  font-size:16px;
  font-weight:700;
}

.primary{
  background:var(--main);
  color:white;
}

.success{
  background:var(--success);
  color:white;
}

.danger{
  background:var(--danger);
  color:white;
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  font-size:16px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.voice-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:9999;
}

.hidden{
  display:none;
}

.voice-modal-content{
  width:100%;
  max-width:560px;
  background:white;
  border-radius:24px;
  padding:24px;
}

.voice-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:20px;
}

.voice-item{
  border-radius:14px;
  padding:14px;
  background:#f8fafc;
  border:2px solid transparent;
  cursor:pointer;
  font-weight:600;
}

.voice-item.active{
  border-color:var(--main);
  color:var(--main);
  animation:blink 1s infinite;
}

.voice-item.done{
  background:#ecfdf5;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:0.35}
  100%{opacity:1}
}

.recognition-box{
  margin-top:18px;
  padding:14px;
  border-radius:14px;
  background:#f8fafc;
  border:1px solid var(--border);
  min-height:80px;
}

.recognition-title{
  font-weight:700;
  margin-bottom:8px;
}

.voice-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:18px;
}

.status{
  margin-top:10px;
  color:var(--muted);
  line-height:1.7;
}

@media(max-width:640px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>体重管理アプリ</h1>

    <button id="openVoiceBtn" class="primary">
      音声入力開始
    </button>

    <div class="status">
      音声入力で順番に各項目を登録できます。
    </div>
  </div>

  <div class="card">
    <div class="grid">

      <div>
        <label>体重</label>
        <input id="weight">
      </div>

      <div>
        <label>体脂肪率</label>
        <input id="bodyFat">
      </div>

      <div>
        <label>内臓脂肪レベル</label>
        <input id="visceralFat">
      </div>

      <div>
        <label>基礎代謝</label>
        <input id="basalMetabolism">
      </div>

      <div>
        <label>BMI</label>
        <input id="bmi">
      </div>

      <div>
        <label>体年齢</label>
        <input id="bodyAge">
      </div>

      <div>
        <label>全身皮下脂肪率</label>
        <input id="subcutaneousFat">
      </div>

      <div>
        <label>全身骨格筋率</label>
        <input id="skeletalMuscle">
      </div>

      <div>
        <label>腹囲</label>
        <input id="waist">
      </div>

    </div>
  </div>

</div>

<div id="voiceModal" class="voice-modal hidden">
  <div class="voice-modal-content">

    <h2>音声入力</h2>

    <div id="voiceList" class="voice-list"></div>

    <div class="recognition-box">
      <div class="recognition-title">認識結果</div>
      <div id="recognitionText"></div>
    </div>

    <div class="voice-buttons">
      <button id="applyBtn" class="success hidden">
        反映
      </button>

      <button id="cancelBtn" class="danger">
        入力キャンセル
      </button>
    </div>

  </div>
</div>

<script>
const metrics = [
  {key:"weight",label:"体重",unit:"kg",min:30,max:200},
  {key:"bodyFat",label:"体脂肪率",unit:"%",min:3,max:50},
  {key:"visceralFat",label:"内臓脂肪レベル",unit:"",min:1,max:30},
  {key:"basalMetabolism",label:"基礎代謝",unit:"kcal",min:800,max:3000},
  {key:"bmi",label:"BMI",unit:"",min:10,max:60},
  {key:"bodyAge",label:"体年齢",unit:"歳",min:10,max:100},
  {key:"subcutaneousFat",label:"全身皮下脂肪率",unit:"%",min:3,max:50},
  {key:"skeletalMuscle",label:"全身骨格筋率",unit:"%",min:20,max:60},
  {key:"waist",label:"腹囲",unit:"cm",min:50,max:200}
];

const values = {};
let currentIndex = 0;
let recognition = null;
let listening = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function renderList(){
  const list = document.getElementById("voiceList");
  list.innerHTML = "";

  metrics.forEach((m,index)=>{
    const div = document.createElement("div");

    div.className = "voice-item";

    if(index === currentIndex && listening){
      div.classList.add("active");
    }

    if(values[m.key] !== undefined){
      div.classList.add("done");
    }

    div.innerHTML = values[m.key] !== undefined
      ? `${m.label} ... ${values[m.key]}${m.unit}`
      : index === currentIndex && listening
      ? `${m.label} ... 音声入力中`
      : m.label;

    div.onclick = ()=>{
      currentIndex = index;
      startRecognition();
    };

    list.appendChild(div);
  });
}

function normalize(text){
  return text
    .replace(/福井/g,"腹囲")
    .replace(/ない臓脂肪/g,"内臓脂肪")
    .replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248));
}

function extractNumber(text){
  const m = text.match(/([0-9]+(?:\.[0-9]+)?)/);
  return m ? Number(m[1]) : null;
}

function currentMetric(){
  return metrics[currentIndex];
}

function startRecognition(){

  if(!SpeechRecognition){
    alert("このブラウザは音声入力非対応です");
    return;
  }

  if(recognition){
    recognition.abort();
  }

  const metric = currentMetric();

  recognition = new SpeechRecognition();
  recognition.lang = "ja-JP";
  recognition.continuous = false;
  recognition.interimResults = false;

  listening = true;

  renderList();

  document.getElementById("recognitionText").innerHTML =
    `<strong>${metric.label}</strong> を音声入力中...`;

  recognition.onresult = e => {

    const transcript = normalize(e.results[0][0].transcript);

    document.getElementById("recognitionText").innerHTML =
      transcript;

    const num = extractNumber(transcript);

    if(num !== null &&
       num >= metric.min &&
       num <= metric.max){

      values[metric.key] = num;

      listening = false;

      renderList();

      moveNextAuto();

    }else{

      listening = false;

      renderList();

      document.getElementById("recognitionText").innerHTML =
        `${metric.label} の数値を認識できませんでした。再度自動で聞き取ります。`;

      setTimeout(()=>{
        startRecognition();
      },1200);
    }
  };

  recognition.onerror = () => {

    listening = false;

    renderList();

    setTimeout(()=>{
      startRecognition();
    },1200);
  };

  recognition.onend = ()=>{
    listening = false;
    renderList();
  };

  recognition.start();
}

function moveNextAuto(){

  const nextIndex = metrics.findIndex(m => values[m.key] === undefined);

  if(nextIndex === -1){

    currentIndex = metrics.length - 1;

    renderList();

    document.getElementById("recognitionText").innerHTML =
      "全項目の入力が完了しました。";

    document.getElementById("applyBtn").classList.remove("hidden");

    return;
  }

  currentIndex = nextIndex;

  renderList();

  setTimeout(()=>{
    startRecognition();
  },900);
}

function openModal(){

  document.getElementById("voiceModal")
    .classList.remove("hidden");

  document.getElementById("applyBtn")
    .classList.add("hidden");

  currentIndex = 0;

  renderList();

  startRecognition();
}

function applyValues(){

  metrics.forEach(m=>{

    if(values[m.key] !== undefined){

      document.getElementById(m.key).value =
        values[m.key];
    }
  });

  closeModal();
}

function closeModal(){

  if(recognition){
    recognition.abort();
  }

  listening = false;

  document.getElementById("voiceModal")
    .classList.add("hidden");
}

document.getElementById("openVoiceBtn")
  .onclick = openModal;

document.getElementById("applyBtn")
  .onclick = applyValues;

document.getElementById("cancelBtn")
  .onclick = closeModal;
</script>

</body>
</html>
